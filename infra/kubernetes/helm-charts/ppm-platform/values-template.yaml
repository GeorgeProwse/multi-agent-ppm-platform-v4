global:
  image:
    pullPolicy: ${IMAGE_PULL_POLICY}
  env:
    LOG_LEVEL: ${LOG_LEVEL}
    OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}

workflowEngine:
  rateLimit: ${WORKFLOW_ENGINE_RATE_LIMIT}

notificationService:
  rateLimit: ${NOTIFICATION_SERVICE_RATE_LIMIT}

observability:
  enabled: ${OBSERVABILITY_ENABLED}
  openTelemetrySidecar:
    enabled: ${OTEL_SIDECAR_ENABLED}
    image:
      repository: ${OTEL_SIDECAR_IMAGE_REPOSITORY}
      tag: ${OTEL_SIDECAR_IMAGE_TAG}
    resources:
      limits:
        cpu: ${OTEL_SIDECAR_CPU_LIMIT}
        memory: ${OTEL_SIDECAR_MEMORY_LIMIT}
      requests:
        cpu: ${OTEL_SIDECAR_CPU_REQUEST}
        memory: ${OTEL_SIDECAR_MEMORY_REQUEST}
  alerts:
    apiLatencyP95Ms: ${ALERT_API_LATENCY_P95_MS}
    apiErrorRatePercent: ${ALERT_API_ERROR_RATE_PERCENT}

audit-log:
  keyVault:
    url: ${KEYVAULT_URL}
    name: ${KEYVAULT_NAME}
    tenantId: ${KEYVAULT_TENANT_ID}
    clientId: ${KEYVAULT_CLIENT_ID}
