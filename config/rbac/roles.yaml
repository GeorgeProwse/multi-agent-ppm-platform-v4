roles:
  - id: "tenant_owner"
    description: "Owns tenant configuration and full access."
    permissions:
      - "portfolio.read"
      - "portfolio.write"
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
      - "audit.read"
      - "audit.write"
      - "connector.sync"
      - "admin.manage"
  - id: "portfolio_admin"
    description: "Manage portfolios and projects."
    permissions:
      - "portfolio.read"
      - "portfolio.write"
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
      - "connector.sync"
  - id: "project_manager"
    description: "Manage assigned projects and workflows."
    permissions:
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
  - id: "analyst"
    description: "Read-only analytics and portfolio visibility."
    permissions:
      - "portfolio.read"
      - "project.read"
      - "workflow.read"
  - id: "auditor"
    description: "Read audit events and compliance artifacts."
    permissions:
      - "audit.read"
      - "portfolio.read"
      - "project.read"
  - id: "integration_service"
    description: "Service account for connector sync automation."
    permissions:
      - "connector.sync"
      - "project.read"
      - "project.write"
      - "audit.write"
