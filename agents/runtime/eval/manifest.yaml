version: 1

evaluations:
  - id: definition-stage-minimal
    stage: definition
    description: Validate core agent metadata is present.
    fixture: fixtures/definition/definition-minimal.yaml
    assertions:
      - field: input.agent_definition.name
        equals: demo-agent
      - field: input.agent_definition.description
        contains: runtime

  - id: prompt-stage-minimal
    stage: prompt
    description: Ensure prompts include the expected user request.
    fixture: fixtures/prompt/prompt-minimal.yaml
    assertions:
      - field: input.prompt.user
        contains: Summarize
      - field: expected.prompt_focus
        equals: status-summary

  - id: tools-stage-minimal
    stage: tools
    description: Confirm required tool calls are captured.
    fixture: fixtures/tools/tools-minimal.yaml
    assertions:
      - field: input.tool_calls[0].name
        equals: search
      - field: expected.first_tool
        equals: search

  - id: runtime-agent-output-check
    stage: response
    description: Validate expected agent response values from fixture outputs.
    fixture: fixtures/flow-intent-router.yaml
    expected_outputs:
      - field: intents[0].intent
        equals: financial_query
      - field: parameters.project_id
        equals: APOLLO

multi_agent_flows:
  - id: intake-to-orchestration-flow
    description: Example multi-agent evaluation flow using fixture outputs.
    steps:
      - id: classify-intent
        fixture: fixtures/flow-intent-router.yaml
        expected_outputs:
          - field: intents[1].intent
            equals: risk_query
      - id: orchestrate-response
        fixture: fixtures/flow-orchestration.yaml
        expected_outputs:
          - field: execution_summary.successful_agents
            equals: 2
          - field: aggregated_response
            contains: risk-management
