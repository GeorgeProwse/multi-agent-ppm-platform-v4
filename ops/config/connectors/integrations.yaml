notification_hubs:
  enabled: false
  namespace: "${AZURE_NOTIFICATION_HUBS_NAMESPACE}"
  hub_name: "${AZURE_NOTIFICATION_HUBS_NAME}"
  mcp:
    server_id: "${AZURE_NOTIFICATION_HUBS_MCP_SERVER_ID}"
    server_url: "${AZURE_NOTIFICATION_HUBS_MCP_SERVER_URL}"
    client_id: "${AZURE_NOTIFICATION_HUBS_MCP_CLIENT_ID}"
    client_secret: "${AZURE_NOTIFICATION_HUBS_MCP_CLIENT_SECRET}"
    auth_scopes: "${AZURE_NOTIFICATION_HUBS_MCP_SCOPE}"
    tool_map: {}
    tools:
      notifications: "notifications"
      registrations: "registrations"
  prefer_mcp: false
  auth:
    type: "sas"
    key_name: "${AZURE_NOTIFICATION_HUBS_SAS_KEY_NAME}"
    key: "${AZURE_NOTIFICATION_HUBS_SAS_KEY}"
  features:
    push: true

# General Integration Settings
integration_defaults:
  retry_policy:
    max_attempts: 3
    backoff_multiplier: 2
    initial_backoff_seconds: 2
  timeout_seconds: 30
  rate_limiting:
    enabled: true
    requests_per_minute: 60
  error_handling:
    log_errors: true
    alert_on_failure: true
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      timeout_seconds: 60

# Asana
asana:
  enabled: false
  base_url: "${ASANA_INSTANCE_URL}"
  mcp:
    server_id: "${ASANA_MCP_SERVER_ID}"
    server_url: "${ASANA_MCP_SERVER_URL}"
    client_id: "${ASANA_MCP_CLIENT_ID}"
    client_secret: "${ASANA_MCP_CLIENT_SECRET}"
    auth_scopes: "${ASANA_MCP_SCOPE}"
    tool_map:
      list_projects: "asana.listProjects"
      create_work_item: "asana.createTask"
      send_message: "asana.addComment"
    tools:
      projects: "projects"
      tasks: "work_items"
      comments: "comments"
  prefer_mcp: false
  auth:
    type: "api_token"
    token: "${ASANA_ACCESS_TOKEN}"
