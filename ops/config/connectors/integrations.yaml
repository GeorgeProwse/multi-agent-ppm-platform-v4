# Collaboration Tools
slack:
  enabled: false
  mcp:
    server_id: "${SLACK_MCP_SERVER_ID}"
    server_url: "${SLACK_MCP_SERVER_URL}"
    client_id: "${SLACK_MCP_CLIENT_ID}"
    client_secret: "${SLACK_MCP_CLIENT_SECRET}"
    auth_scopes: "${SLACK_MCP_SCOPE}"
    tool_map:
      list_projects: "slack.listChannels"
      send_message: "slack.postMessage"
      list_users: "slack.listUsers"
    tools:
      channels: "channels"
      messages: "messages"
      users: "users"
  prefer_mcp: false
  auth:
    type: "bot_token"
    token: "${SLACK_BOT_TOKEN}"
  features:
    notifications: true
    commands: true
    interactive_messages: true

teams:
  enabled: false
  mcp:
    server_id: "${TEAMS_MCP_SERVER_ID}"
    server_url: "${TEAMS_MCP_SERVER_URL}"
    client_id: "${TEAMS_MCP_CLIENT_ID}"
    client_secret: "${TEAMS_MCP_CLIENT_SECRET}"
    auth_scopes: "${TEAMS_MCP_SCOPE}"
    tool_map:
      list_projects: "teams.listTeams"
      send_message: "teams.postMessage"
      list_channels: "teams.listChannels"
    tools:
      teams: "teams"
      channels: "channels"
      messages: "messages"
  prefer_mcp: false
  auth:
    type: "app_credentials"
    client_id: "${TEAMS_CLIENT_ID}"
    client_secret: "${TEAMS_CLIENT_SECRET}"
    tenant_id: "${TEAMS_TENANT_ID}"
  features:
    notifications: true
    cards: true

m365:
  enabled: false
  base_url: "${M365_API_URL}"
