# Integration Connector Configurations
# See: docs/connectors/overview.md
#
# MCP configuration is consolidated under the nested `mcp:` key for each
# connector.  Do NOT duplicate MCP fields at the top level.

# Project Management Systems
planview:
  enabled: false
  base_url: "${PLANVIEW_API_URL}"
  mcp:
    server_id: "${PLANVIEW_MCP_SERVER_ID}"
    server_url: "${PLANVIEW_MCP_SERVER_URL}"
    client_id: "${PLANVIEW_MCP_CLIENT_ID}"
    client_secret: "${PLANVIEW_MCP_CLIENT_SECRET}"
    auth_scopes: "${PLANVIEW_MCP_SCOPE}"
    tool_map:
      list_projects: "planview.listProjects"
      create_work_item: "planview.createWorkItem"
    tools:
      projects: "projects"
      work_items: "work_items"
      resources: "resources"
  prefer_mcp: false
  auth:
    type: "oauth2"
    token: "${PLANVIEW_API_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 30
    entities:
      - projects
      - resources
      - financials

# Clarity PPM
clarity:
  enabled: false
  base_url: "${CLARITY_INSTANCE_URL}"
  mcp:
    server_id: "${CLARITY_MCP_SERVER_ID}"
    server_url: "${CLARITY_MCP_SERVER_URL}"
    client_id: "${CLARITY_MCP_CLIENT_ID}"
    client_secret: "${CLARITY_MCP_CLIENT_SECRET}"
    auth_scopes: "${CLARITY_MCP_SCOPE}"
    tool_map:
      list_projects: "clarity.listProjects"
      create_work_item: "clarity.createWorkItem"
    tools:
      projects: "projects"
      work_items: "work_items"
  prefer_mcp: false
  auth:
    type: "oauth2"
    token: "${CLARITY_REFRESH_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 30
    entities:
      - projects

jira:
  enabled: false
  base_url: "${JIRA_URL}"
  mcp:
    server_id: "${JIRA_MCP_SERVER_ID}"
    server_url: "${JIRA_MCP_SERVER_URL}"
    client_id: "${JIRA_MCP_CLIENT_ID}"
    client_secret: "${JIRA_MCP_CLIENT_SECRET}"
    auth_scopes: "${JIRA_MCP_SCOPE}"
    tool_map: {}
    tools:
      projects: "projects"
      issues: "work_items"
      sprints: "sprints"
  prefer_mcp: false
  auth:
    type: "api_token"
    email: "${JIRA_EMAIL}"
    token: "${JIRA_API_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 15
    entities:
      - projects
      - issues
      - sprints
  field_mapping:
    project_key: "project.id"
    issue_key: "task.id"
    summary: "task.name"

azure_devops:
  enabled: false
  organization: "${AZURE_DEVOPS_ORG}"
  mcp:
    server_id: "${AZURE_DEVOPS_MCP_SERVER_ID}"
    server_url: "${AZURE_DEVOPS_MCP_SERVER_URL}"
    client_id: "${AZURE_DEVOPS_MCP_CLIENT_ID}"
    client_secret: "${AZURE_DEVOPS_MCP_CLIENT_SECRET}"
    auth_scopes: "${AZURE_DEVOPS_MCP_SCOPE}"
    tool_map: {}
    tools:
      projects: "projects"
      work_items: "work_items"
      iterations: "iterations"
  prefer_mcp: false
  auth:
    type: "pat"
    token: "${AZURE_DEVOPS_PAT}"
  sync:
    enabled: true
    interval_minutes: 15

