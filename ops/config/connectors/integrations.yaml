# Communications & Notification Systems
azure_communication_services:
  enabled: false
  base_url: "${ACS_ENDPOINT}"
  mcp:
    server_id: "${AZURE_COMMUNICATION_SERVICES_MCP_SERVER_ID}"
    server_url: "${AZURE_COMMUNICATION_SERVICES_MCP_SERVER_URL}"
    client_id: "${AZURE_COMMUNICATION_SERVICES_MCP_CLIENT_ID}"
    client_secret: "${AZURE_COMMUNICATION_SERVICES_MCP_CLIENT_SECRET}"
    auth_scopes: "${AZURE_COMMUNICATION_SERVICES_MCP_SCOPE}"
    tool_map: {}
    tools:
      sms: "sms"
      email: "email"
  prefer_mcp: false
  auth:
    type: "api_key"
    connection_string: "${AZURE_COMMUNICATION_SERVICES_CONNECTION_STRING}"
    access_key: "${ACS_ACCESS_KEY}"
  features:
    sms: true
    email: true

twilio:
  enabled: false
  base_url: "${TWILIO_API_URL}"
  mcp:
    server_id: "${TWILIO_MCP_SERVER_ID}"
    server_url: "${TWILIO_MCP_SERVER_URL}"
    client_id: "${TWILIO_MCP_CLIENT_ID}"
    client_secret: "${TWILIO_MCP_CLIENT_SECRET}"
    auth_scopes: "${TWILIO_MCP_SCOPE}"
    tool_map: {}
    tools:
      sms: "sms"
      calls: "calls"
  prefer_mcp: false
