roles:
  - id: portfolio_manager
    description: Manages portfolio-level planning, prioritization, and reporting.
    permissions:
      - action: read
        resource: portfolio
      - action: update
        resource: portfolio
      - action: read
        resource: project
      - action: approve
        resource: budget
      - action: read
        resource: compliance_report

  - id: project_manager
    description: Owns project execution and delivery operations.
    permissions:
      - action: read
        resource: project
      - action: update
        resource: project
      - action: create
        resource: task
      - action: update
        resource: task
      - action: read
        resource: budget

  - id: finance_controller
    description: Controls budgeting, forecasting, and financial approvals.
    permissions:
      - action: read
        resource: portfolio
      - action: read
        resource: project
      - action: read
        resource: budget
      - action: update
        resource: budget
      - action: approve
        resource: budget
      - action: read
        resource: financial_report

  - id: compliance_officer
    description: Oversees regulatory controls, audits, and high-risk projects.
    permissions:
      - action: read
        resource: portfolio
      - action: read
        resource: project
      - action: read
        resource: audit_log
      - action: update
        resource: compliance_control
      - action: approve
        resource: compliance_exception
      - action: read
        resource: regulatory_report
